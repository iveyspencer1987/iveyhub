<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Ivey Family Sports Hub</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
margin:0;
padding:20px;
color:#ffffff;

background:
linear-gradient(rgba(10,20,35,.45), rgba(10,20,35,.55)),
url("images/family-background.jpg") center center / cover no-repeat fixed;
}

h1{
text-align:center;
margin-bottom:10px;
color:#ffffff;
text-shadow:0 2px 8px rgba(0,0,0,.4);
}

.card{
background:rgba(255,255,255,0.18);
border:1px solid rgba(255,255,255,0.25);
border-radius:16px;
padding:16px;
margin-bottom:20px;
backdrop-filter:blur(10px);
-webkit-backdrop-filter:blur(10px);
box-shadow:0 8px 24px rgba(0,0,0,.25);
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
margin-right:8px;
}

.orange{background:#F28C28;color:white;}
.red{background:#C94141;color:white;}
.green{background:#39FF14;color:#111;}
.blue{background:#1E3A5F;color:white;}

#calendarMonth{
font-size:20px;
font-weight:bold;
margin-bottom:10px;
}

</style>

</head>

<body>

<h1>Ivey Family Sports Hub</h1>


<div class="card">

<h2>Live Hub</h2>

<button class="orange">Shep GameChanger</button>

<button class="red">Scarlett Soccer</button>

<button class="green">Beau Braves</button>

</div>



<div class="card">

<h2>Family Calendar</h2>

<div id="calendarMonth"></div>

<div id="nextUpBanner"></div>

<div id="calendar"></div>

</div>



<script>

const calendar = document.getElementById("calendar")

const monthLabel = document.getElementById("calendarMonth")

const nextUpBanner = document.getElementById("nextUpBanner")

const today = new Date()

let currentMonth = today.getMonth()

let currentYear = today.getFullYear()



const calendarEvents = [

{ date:"2026-03-13", title:"Lobos Tournament - Conway", type:"shep"},

{ date:"2026-03-14", title:"Lobos Tournament - Conway", type:"shep"},

{ date:"2026-03-15", title:"Bracket Game 8AM - Conway", type:"shep"},

{ date:"2026-03-21", title:"Scarlett vs Rogers 11:15", type:"scarlett"},

{ date:"2026-04-04", title:"Scarlett vs Robinson 11:15", type:"scarlett"},

{ date:"2026-04-11", title:"Scarlett vs Collins 11:15", type:"scarlett"},

{ date:"2026-03-16", title:"Braves Practice 6:15", type:"beau"},

{ date:"2026-03-21", title:"Braves Practice 1:00", type:"beau"},

{ date:"2026-03-28", title:"Braves Practice 1:00", type:"beau"},

{ date:"2026-03-20", title:"Family 3v3 Practice", type:"family"},

{ date:"2026-03-27", title:"Family 3v3 Practice", type:"family"}

]



function getColor(type){

if(type=="shep") return "#F28C28"

if(type=="scarlett") return "#C94141"

if(type=="beau") return "#39FF14"

return "#1E3A5F"

}



function renderNextUp(){

let upcoming = calendarEvents
.sort((a,b)=> new Date(a.date)-new Date(b.date))[0]

if(!upcoming) return

nextUpBanner.innerHTML=`

<div style="
padding:12px;
border-radius:10px;
background:rgba(255,255,255,.25);
border:1px solid rgba(255,255,255,.3);
margin-bottom:10px;
">

<b>Next Up</b><br>

${upcoming.title}<br>

${upcoming.date}

</div>

`

}



function renderCalendar(){

const firstDay = new Date(currentYear,currentMonth,1).getDay()

const daysInMonth = new Date(currentYear,currentMonth+1,0).getDate()

monthLabel.innerText =
new Date(currentYear,currentMonth)
.toLocaleString('default',{month:'long'})+" "+currentYear

calendar.innerHTML=""

let controls=document.createElement("div")

controls.innerHTML=`

<button onclick="prevMonth()">Prev</button>

<button onclick="goToday()">Today</button>

<button onclick="nextMonth()">Next</button>

`

controls.style.marginBottom="10px"

calendar.appendChild(controls)



let grid=document.createElement("div")

grid.style.display="grid"

grid.style.gridTemplateColumns="repeat(7,1fr)"

grid.style.gap="6px"



for(let i=0;i<firstDay;i++){

grid.innerHTML+="<div></div>"

}



for(let d=1;d<=daysInMonth;d++){

let day=document.createElement("div")

day.style.background="rgba(255,255,255,.22)"

day.style.border="1px solid rgba(255,255,255,.25)"

day.style.borderRadius="8px"

day.style.padding="10px"

day.style.minHeight="90px"

day.style.backdropFilter="blur(6px)"

day.style.webkitBackdropFilter="blur(6px)"



let dateKey=
currentYear+"-"+String(currentMonth+1).padStart(2,'0')+"-"+String(d).padStart(2,'0')



day.innerHTML="<b>"+d+"</b>"



calendarEvents.forEach(event=>{

if(event.date==dateKey){

let item=document.createElement("div")

item.innerText=event.title

item.style.background=getColor(event.type)

item.style.color="white"

item.style.padding="4px"

item.style.marginTop="4px"

item.style.borderRadius="6px"

item.style.fontSize="11px"

day.appendChild(item)

}

})



grid.appendChild(day)

}



calendar.appendChild(grid)

renderNextUp()

}



function prevMonth(){

currentMonth--

if(currentMonth<0){

currentMonth=11

currentYear--

}

renderCalendar()

}



function nextMonth(){

currentMonth++

if(currentMonth>11){

currentMonth=0

currentYear++

}

renderCalendar()

}



function goToday(){

currentMonth=today.getMonth()

currentYear=today.getFullYear()

renderCalendar()

}



renderCalendar()

</script>

</body>
</html>
